<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeadCraft - Perler Bead Pattern Generator</title>
  <link rel="stylesheet" href="/static/style.css?v=23">
</head>
<body>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>
  <div class="site-version-badge">v5.26.316</div>

  <!-- Main Layout -->
  <div class="main-container">

    <!-- Result Area -->
    <div id="result-area" style="width: 100%; max-width: 640px; margin: 0 auto;">

      <!-- Canvas Toolbar -->
        <div class="canvas-toolbar">
          <div style="flex: 1;"></div>
          <div id="ble-target-chip" class="toolbar-chip" style="display: none;"></div>
          <button id="bg-toggle" class="toolbar-btn" onclick="toggleBackground()" title="自动去除背景">
            背
          </button>
          <button id="clear-btn" class="toolbar-btn" onclick="clearCanvas()" title="清除">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
          <button id="upload-btn" class="toolbar-btn" onclick="document.getElementById('file-input').click()" title="上传">
            <span class="toolbar-btn-icon">+</span>
          </button>
          <button id="scan-btn" class="toolbar-btn" onclick="openQrScanner()" title="扫描二维码">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 9V5h4"></path>
              <path d="M20 9V5h-4"></path>
              <path d="M4 15v4h4"></path>
              <path d="M20 15v4h-4"></path>
              <path d="M9 12h6"></path>
              <path d="M12 9v6"></path>
            </svg>
          </button>
          <input type="file" id="file-input" class="hidden-input" accept="image/jpeg,image/png,image/gif,image/webp">
          <select id="difficulty-select" class="led-size-btn" title="难度" onchange="onDifficultyChange()">
            <option value="1.0">原</option>
            <option value="0.25">难</option>
            <option value="0.125" selected>中</option>
            <option value="0.0625">易</option>
            <option value="custom">自</option>
          </select>
          <select id="led-matrix-size" class="led-size-btn" onchange="updateLedSizeDisplay()">
            <option value="16">16</option>
            <option value="32">32</option>
            <option value="52">52</option>
            <option value="64" selected>64</option>
          </select>
          <button id="mode-quick-btn" class="toolbar-btn mode-quick-btn" onclick="cycleConnectionMode()" title="连接模式">
            蓝牙
          </button>
          <button class="toolbar-btn" onclick="showSerialSettings()" title="设置">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </button>
        </div>
        <!-- Canvas Container with Upload Area -->
        <div class="canvas-container" style="margin: 0 auto; position: relative;">
          <!-- Upload Area (default) -->
          <div id="upload-area" class="upload-area scan-guide" onclick="openQrScanner()">
            <div class="upload-area-icon">QR</div>
            <div class="upload-area-text">先扫描设备二维码进行配对</div>
            <div class="upload-area-hint">已配对后可继续上传图片；也可在设置中切换 WiFi 模式</div>
          </div>
          <!-- Pattern Canvas (after generate) -->
          <canvas id="pattern-canvas" style="display: none;"></canvas>
        </div>

        <!-- Example Images Gallery (shown when no image) -->
        <div id="examples-container" class="section examples-section" style="margin-top: 12px;">
          <div class="section-title" data-i18n="examples.title">示例图片</div>
          <div class="examples-gallery">
            <div class="example-item" onclick="loadExampleImage('luoxiaohei')">
              <img src="/examples/luoxiaohei_thumb.png" alt="Luo Xiaohei" class="example-thumb">
              <div class="example-name">Luo Xiaohei</div>
            </div>
            <div class="example-item" onclick="loadExampleImage('meili')">
              <img src="/examples/meili_thumb.png" alt="Meili" class="example-thumb">
              <div class="example-name">Meili</div>
            </div>
            <div class="example-item" onclick="loadExampleImage('pony')">
              <img src="/examples/pony_thumb.png" alt="Pony" class="example-thumb">
              <div class="example-name">Pony</div>
            </div>
            <div class="example-item" onclick="loadExampleImage('usachi')">
              <img src="/examples/usachi_thumb.png" alt="Usachi" class="example-thumb">
              <div class="example-name">Usachi</div>
            </div>
          </div>
        </div>

        <!-- Color Panel -->
        <div class="color-panel" id="color-panel" style="display: none; flex-direction: column; align-items: flex-start;">
          <!-- Custom Size Slider (horizontal, above color list) -->
          <div id="custom-slider-container" style="display: none; position: relative; width: 640px; margin-bottom: 8px;">
            <input type="range" id="custom-pixel-slider" min="4" max="32" value="8" style="width: 100%; height: 4px;" oninput="updateCustomPixelValue()" onchange="onCustomSliderRelease()">
            <span id="custom-pixel-value" style="position: absolute; top: -18px; font-size: 12px; transform: translateX(-50%); pointer-events: none;"></span>
          </div>
          <div style="display: flex; flex-direction: column; flex: 1; width: 100%;">
            <div id="color-list" class="color-list"></div>
            <div id="color-total" class="color-total"></div>
          </div>
        </div>

    </div>
  </div>

  <script src="/static/vendor/jsQR.js"></script>
  <script src="/static/i18n.js?v=73"></script>
  <script src="/static/app.js?v=84"></script>

  <!-- Serial Port Dialog (Settings) -->
  <div id="serial-settings-dialog" class="modal" style="display: none;">
    <div class="modal-content modal-content-form qr-modal-content">
      <div class="modal-header">
        <h3>设置</h3>
        <button class="modal-close" onclick="hideSerialSettings()">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Connection Mode -->
        <div class="form-group">
          <label class="form-label">连接模式：</label>
          <div class="mode-toggle">
            <button class="mode-btn active" data-mode="ble" onclick="setConnectionMode('ble')">蓝牙</button>
            <button class="mode-btn" data-mode="wifi" onclick="setConnectionMode('wifi')">WiFi</button>
            <button class="mode-btn" data-mode="serial" onclick="setConnectionMode('serial')">串口</button>
          </div>
        </div>

        <div id="wifi-settings" class="connection-settings" style="display: none;">
          <div id="wifi-status-card" class="ble-status-card" style="display: block;">
            请在扫码弹窗中锁定设备，并让 ESP32 扫描附近热点
          </div>
          <div class="form-group">
            <label class="form-label">目标设备：</label>
            <select id="wifi-device-select">
              <option value="">请在扫码弹窗中扫描设备</option>
            </select>
            <button class="btn btn-small" onclick="openQrScanner()">打开扫码</button>
          </div>
        </div>
        
        <!-- Serial Port Selection (default) -->
        <div id="serial-settings" class="connection-settings">
          <div class="form-group">
            <label class="form-label">串口：</label>
            <select id="serial-port-select">
              <option value="">扫描中...</option>
            </select>
            <button class="btn btn-small" onclick="refreshSerialPorts()">刷新</button>
          </div>
          <div class="form-group">
            <label class="form-label">波特率：</label>
            <select id="serial-baud-select">
              <option value="115200">115200</option>
              <option value="230400">230400</option>
              <option value="460800" selected>460800</option>
              <option value="921600">921600</option>
            </select>
          </div>
        </div>
        
        <!-- BLE Device Selection (hidden by default) -->
        <div id="ble-settings" class="connection-settings" style="display: none;">
          <div id="ble-status-card" class="ble-status-card" style="display: none;"></div>
          <div class="form-group">
            <label class="form-label">蓝牙设备：</label>
            <select id="ble-device-select">
              <option value="">扫描中...</option>
            </select>
            <button class="btn btn-small" onclick="refreshBLEDevices()">刷新</button>
            <button id="ble-connect-btn" class="btn btn-primary btn-small ble-connect-btn" onclick="connectBLEDevice()">连接设备</button>
          </div>
        </div>
        
        <!-- Background Color -->
        <div class="form-group">
          <label class="form-label">背景色（透明区域）：</label>
          <input type="color" id="serial-bg-color" value="#000000">
        </div>
        
        <!-- Action Buttons -->
        <div class="form-group" style="border-top: 1px solid #ddd; padding-top: 15px; margin-top: 15px;">
          <label class="form-label">操作：</label>
          <div style="display: flex; flex-wrap: wrap; gap: 8px;">
            <button class="btn btn-primary" onclick="sendToESP32Direct(); hideSerialSettings();">发送到ESP32</button>
            <button class="btn btn-secondary" onclick="exportPNG()">导出PNG</button>
            <button class="btn btn-secondary" onclick="exportPDF()">导出PDF</button>
            <button class="btn btn-secondary" onclick="exportJSON()">导出JSON</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="hideSerialSettings()">关闭</button>
      </div>
    </div>
  </div>
  
  <!-- Serial Status Toast -->
  <div id="serial-toast" class="serial-toast" style="display: none;"></div>
  
  <!-- Image Crop Dialog -->
  <div id="crop-dialog" class="modal" style="display: none;">
    <div class="modal-content modal-content-crop" style="width: auto; max-width: 80vw; max-height: 85vh;">
      <div class="modal-header">
        <h3>裁剪图像</h3>
        <button class="modal-close" onclick="cancelCrop()">&times;</button>
      </div>
      <div class="modal-body modal-body-crop" style="padding: 10px; display: flex; justify-content: center; align-items: center; overflow: auto;">
        <div id="crop-container" class="crop-surface" style="position: relative; display: inline-block;">
          <img id="crop-image" style="max-width: 100%; max-height: 70vh; display: block;">
          <div id="crop-box" style="position: absolute; border: 2px dashed #fff; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); cursor: move;"></div>
        </div>
      </div>
      <div class="modal-footer modal-footer-split" style="display: flex; gap: 0;">
        <button class="btn btn-secondary" onclick="cancelCrop()" style="flex: 1; border-radius: 0;">取消</button>
        <button class="btn btn-primary" onclick="confirmCrop()" style="flex: 1; border-radius: 0;">确认裁剪</button>
      </div>
    </div>
  </div>
  <div id="qr-scanner-dialog" class="modal" style="display: none;">
    <div class="modal-content modal-content-form qr-modal-content">
      <div class="modal-header">
        <h3>扫描二维码</h3>
        <button class="modal-close" onclick="closeQrScanner()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="qr-mode-toggle">
          <button id="qr-mode-ble-btn" class="mode-btn active" onclick="setQrScannerMode('ble')">蓝牙配对</button>
          <button id="qr-mode-wifi-btn" class="mode-btn" onclick="setQrScannerMode('wifi')">WiFi 扫描</button>
        </div>
        <div id="qr-scanner-frame" class="qr-scanner-frame">
          <video id="qr-scanner-video" autoplay playsinline muted></video>
          <div class="qr-scanner-overlay"></div>
        </div>
        <div id="qr-scanner-actions" class="qr-scanner-actions">
          <button class="btn btn-secondary" onclick="triggerQrImagePicker()">拍照/选图识别</button>
          <input id="qr-image-input" class="hidden-input" type="file" accept="image/*" capture="environment">
        </div>
        <div id="qr-scanner-manual" class="qr-scanner-manual">
          <input id="manual-uuid-input" type="text" placeholder="输入设备 UUID">
          <button id="qr-manual-submit-btn" class="btn btn-primary" onclick="connectByManualUuid()">连接 UUID</button>
        </div>
        <div id="qr-wifi-panel" class="qr-wifi-panel" style="display: none;">
          <div class="qr-wifi-panel-title">附近热点</div>
          <div id="qr-wifi-list" class="qr-wifi-list"></div>
          <div id="qr-wifi-connect-panel" class="qr-wifi-connect-panel" style="display: none;">
            <div id="qr-wifi-selected" class="qr-wifi-selected"></div>
            <input id="qr-wifi-password" type="password" placeholder="输入 WiFi 密码" autocomplete="current-password">
            <button id="qr-wifi-connect-btn" class="btn btn-primary" onclick="connectSelectedQrWifi()">连接这个 WiFi</button>
          </div>
        </div>
        <div id="qr-scanner-status" class="qr-scanner-status">正在启动摄像头...</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="triggerQrHotspotScan()">扫描热点</button>
      </div>
    </div>
  </div>
  <div id="ble-quick-connect" class="ble-quick-connect" style="display: none;">
    <div class="ble-quick-connect-card">
      <div class="ble-quick-connect-title">连接这台设备</div>
      <div id="ble-quick-connect-text" class="ble-quick-connect-text"></div>
      <div class="ble-quick-connect-actions">
        <button class="btn btn-secondary" onclick="hideBleQuickConnect()">稍后</button>
        <button class="btn btn-primary" onclick="confirmBleQuickConnect()">连接设备</button>
      </div>
    </div>
  </div>
</body>
</html>
