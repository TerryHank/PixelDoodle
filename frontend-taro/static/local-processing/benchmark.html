<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Processing Benchmark</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #17324d;
      --muted: #6a7c8f;
      --accent: #2f80ed;
      --border: #d9e3ef;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(180deg, #eef4fb 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 18px 40px rgba(31, 57, 88, 0.08);
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    select, button {
      font: inherit;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: white;
    }
    button {
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
    }
    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }
    .status {
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }
    td {
      font-size: 14px;
    }
    code {
      background: #eef4fb;
      border-radius: 6px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>本地生图链路基准</h1>
      <p>对比三条生成路径：Rust Axum HTTP、TypeScript Web Worker、Rust WebAssembly Worker。基准使用同一张示例图与同一组默认参数。</p>
      <div class="toolbar">
        <select id="benchmark-example">
          <option value="luoxiaohei">luoxiaohei</option>
          <option value="meili">meili</option>
          <option value="pony">pony</option>
          <option value="usachi">usachi</option>
        </select>
        <button id="benchmark-run">运行基准</button>
      </div>
      <div id="benchmark-status" class="status">等待开始</div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>引擎</th>
            <th>3 次耗时</th>
            <th>平均耗时</th>
            <th>与服务端结果一致</th>
            <th>说明</th>
          </tr>
        </thead>
        <tbody id="benchmark-results"></tbody>
      </table>
    </div>

    <div class="card">
      <p>说明：</p>
      <p><code>server-http</code> 是当前生产 Rust/Axum 方案。</p>
      <p><code>ts-worker</code> 是浏览器本地 TypeScript 重写实验。</p>
      <p><code>wasm-worker</code> 是浏览器本地 Rust 核心编译到 WebAssembly 的实验。</p>
    </div>
  </div>
  <script type="module" src="/static/local-processing/benchmark.js"></script>
</body>
</html>
